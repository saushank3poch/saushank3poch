name: Update contribution graph

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate contributions SVG
        env:
          # Must be a classic PAT (repo scope) so private contributions are included.
          GH_TOKEN: ${{ secrets.CONTRIBUTIONS_PAT }}
        run: python3 scripts/generate_contributions.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contributions.svg
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Refresh contribution graph"
          git push
